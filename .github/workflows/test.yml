name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Supported Workspaces
        run: npm run build

      - name: Run Governed Checks
        run: npm run check

      - name: Generate Repo Map
        run: npm run repo:map:json

      - name: Upload Repo Map Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-map
          path: .ai/
          retention-days: 30
