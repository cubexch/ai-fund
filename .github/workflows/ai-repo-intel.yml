name: AI Repo Intelligence

on:
  pull_request:
  workflow_dispatch:

jobs:
  map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate repo intelligence artifacts
        run: npm run repo:map:json

      - name: Upload AI context artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-repo-intelligence
          path: |
            .ai/repo-map.json
            .ai/context-pack.md
