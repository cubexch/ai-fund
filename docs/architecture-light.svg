    <circle cx="355" cy="109" r="7" fill="none" stroke="#D4A20A" stroke-width="1.3"/>
    <circle cx="355" cy="106" r="2.8" fill="#D4A20A"/>
    <path d="M 349 114 Q 352 110 355 110 Q 358 110 361 114" fill="none" stroke="#D4A20A" stroke-width="1.2" stroke-linecap="round"/>
