  <!-- 100+ more -->
  <text x="400" y="665" text-anchor="middle" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;fill:#aaa;letter-spacing:0.5px;">+ 100 more exchanges via CCXT</text>

  <!-- Disclaimer -->
  <text x="400" y="700" text-anchor="middle" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:10px;fill:#bbb;font-style:italic;">* Names represent AI trading personas inspired by famous strategies — not real people</text>

</svg>
