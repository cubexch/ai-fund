    <path d="M 448 325 C 500 325, 530 325, 555 320"/>
    <path d="M 450 340 C 505 340, 540 340, 555 350"/>
    <path d="M 448 355 C 500 355, 530 360, 555 380"/>
    <path d="M 445 368 C 490 368, 520 380, 555 410"/>
    <path d="M 442 380 C 480 380, 510 400, 555 440"/>
