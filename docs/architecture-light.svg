    <text x="582" y="384" style="font-size:14px;fill:#555;font-weight:500;">Jesse Livermore</text>

    <circle cx="565" cy="410" r="12" fill="none" stroke="#D4A20A" stroke-width="1.2" opacity="0.7"/>
    <text x="565" y="414" text-anchor="middle" style="font-size:8px;fill:#D4A20A;font-weight:600;">CZ</text>
    <text x="582" y="414" style="font-size:14px;fill:#555;font-weight:500;">CZ</text>

    <circle cx="565" cy="440" r="12" fill="none" stroke="#D4A20A" stroke-width="1.2" opacity="0.5" stroke-dasharray="3 2"/>
