    <text x="582" y="444" style="font-size:13px;fill:#999;font-style:italic;">42 agents...</text>
  </g>

  <!-- ═══ EXCHANGE PILLS ═══ -->
  <g filter="url(#shadow)">
    <rect x="68" y="585" width="160" height="52" rx="26" fill="#f5f0e8" stroke="#D4A20A" stroke-width="1.5"/>
    <text x="148" y="616" text-anchor="middle" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:700;fill:#2a2318;">Cube Exchange</text>

    <rect x="248" y="585" width="130" height="52" rx="26" fill="#f5f0e8" stroke="#d8d0c0" stroke-width="1.5"/>
    <text x="313" y="616" text-anchor="middle" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:600;fill:#555;">Kraken</text>

    <rect x="398" y="585" width="130" height="52" rx="26" fill="#f5f0e8" stroke="#d8d0c0" stroke-width="1.5"/>
    <text x="463" y="616" text-anchor="middle" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:600;fill:#555;">Binance</text>

    <rect x="548" y="585" width="155" height="52" rx="26" fill="#f5f0e8" stroke="#d8d0c0" stroke-width="1.5"/>
