<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" width="800" height="720">
  <defs>
    <filter id="center-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="trunk-glow" x="-300%" y="-10%" width="700%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <radialGradient id="center-aura" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#F0B90B" stop-opacity="0.15"/>
      <stop offset="25%" stop-color="#F0B90B" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#F0B90B" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#F0B90B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ═══ BOTTOM CABLE BUNDLE ═══ -->
  <g fill="none" stroke="#e0d8c8" stroke-linecap="round">
    <path d="M 396 405 C 396 480, 340 520, 145 600" stroke-width="16"/>
    <path d="M 400 405 C 400 490, 380 540, 310 600" stroke-width="14"/>
    <path d="M 400 405 C 400 490, 420 540, 490 600" stroke-width="14"/>
    <path d="M 404 405 C 404 480, 460 520, 655 600" stroke-width="16"/>
  </g>
  <g fill="none" stroke="#d0c8b4" stroke-linecap="round">
    <path d="M 396 405 C 396 480, 340 520, 145 600" stroke-width="5"/>
    <path d="M 400 405 C 400 490, 380 540, 310 600" stroke-width="4"/>
    <path d="M 400 405 C 400 490, 420 540, 490 600" stroke-width="4"/>
    <path d="M 404 405 C 404 480, 460 520, 655 600" stroke-width="5"/>
  </g>

  <!-- ═══ GOLDEN TRUNK ═══ -->
  <rect x="394" y="10" width="12" height="270" rx="6" fill="#F0B90B" opacity="0.15" filter="url(#trunk-glow)"/>
  <rect x="394" y="405" width="12" height="60" rx="6" fill="#F0B90B" opacity="0.1" filter="url(#trunk-glow)"/>
  <rect x="397" y="10" width="6" height="270" rx="3" fill="#D4A20A"/>
  <rect x="397" y="415" width="6" height="50" rx="3" fill="#D4A20A" opacity="0.5"/>

  <!-- Animated pulses -->
  <circle r="6" fill="#D4A20A" filter="url(#trunk-glow)" opacity="0">
    <animateMotion path="M 400,30 L 400,275" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#D4A20A" filter="url(#trunk-glow)" opacity="0">
    <animateMotion path="M 400,30 L 400,275" dur="1.8s" repeatCount="indefinite" begin="0.9s"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.8s" repeatCount="indefinite" begin="0.9s"/>
  </circle>

  <!-- ═══ LEFT BRANCH PATHS ═══ -->
  <g fill="none" stroke="#c8c0aa" stroke-width="1.5" stroke-linecap="round">
    <path d="M 355 310 C 310 310, 280 305, 245 290"/>
    <path d="M 352 325 C 300 325, 270 325, 245 320"/>
    <path d="M 350 340 C 295 340, 260 340, 245 350"/>
    <path d="M 352 355 C 300 355, 270 360, 245 380"/>
    <path d="M 355 368 C 310 368, 280 380, 245 410"/>
    <path d="M 358 380 C 320 380, 290 400, 245 440"/>
  </g>

