  <circle cx="400" cy="345" r="55" fill="#ffffff" filter="url(#center-glow)"/>
  <circle cx="400" cy="345" r="55" fill="#ffffff"/>
  <circle cx="400" cy="345" r="57" fill="none" stroke="#D4A20A" stroke-width="3"/>
  <text x="400" y="338" text-anchor="middle" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:22px;font-weight:800;fill:#1a1510;">AI</text>
  <text x="400" y="362" text-anchor="middle" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:600;fill:#777;letter-spacing:1px;">Fund</text>
  <circle cx="400" cy="345" r="57" fill="none" stroke="#D4A20A" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="57;88" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0" dur="3s" repeatCount="indefinite"/>
  </circle>

